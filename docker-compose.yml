version: '3'

services:
  emqx:
    image: emqx/emqx:latest
    container_name: emqx
    restart: always
    ports:
      - "1883:1883"   # MQTT
      - "8883:8883"   # MQTT com TLS
      - "8083:8083"   # MQTT via WebSocket
      - "8084:8084"   # MQTT via WebSocket seguro
      - "18083:18083" # Dashboard
    environment:
      - EMQX_NODE_NAME=emqx@127.0.0.1
      - EMQX_ALLOW_ANONYMOUS=true   # permite conexões sem usuário/senha
      - EMQX_LISTENER__TCP__EXTERNAL=1883
      - EMQX_LISTENER__SSL__EXTERNAL=8883
