<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Postura</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header>
      <p>Postura IoT</p>
      <h1 id="status">Aguardando sensor</h1>
      <span id="device">postura-uno</span>
    </header>

    <section class="gauge" aria-label="Leitura atual">
      <div class="dial">
        <span id="angle">0.0°</span>
      </div>
      <input id="angleInput" type="range" min="-60" max="60" step="1" value="0">
    </section>

    <section class="actions">
      <button data-angle="0">Ereta</button>
      <button data-angle="18">Leve</button>
      <button data-angle="32">Alerta</button>
      <button id="send">Enviar teste</button>
    </section>

    <section class="feed">
      <h2>Ultimas leituras</h2>
      <ul id="feed"></ul>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
